<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>閫氱煡鏍?- 鐧戒簯宸ュ叿鐩?/title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Microsoft YaHei', sans-serif;
  background: #0a0a0a; color: #e0e0e0; min-height: 100vh;
}
.header {
  background: #111; padding: 16px 24px; display: flex;
  align-items: center; justify-content: space-between; border-bottom: 1px solid #222;
}
.header h1 { font-size: 20px; color: #fff; }
.user-bar { display: flex; align-items: center; gap: 12px; }
.logout-btn { background: none; border: 1px solid #444; color: #888; padding: 4px 12px; border-radius: 4px; cursor: pointer; font-size: 12px; }
.logout-btn:hover { border-color: #e74c3c; color: #e74c3c; }
.container { max-width: 800px; margin: 0 auto; padding: 24px; }

.login-box {
  max-width: 360px; margin: 80px auto;
  background: #141414; border: 1px solid #222; border-radius: 8px; padding: 32px; text-align: center;
}
.login-box h2 { margin-bottom: 8px; font-size: 22px; }
.login-box p { color: #666; font-size: 13px; margin-bottom: 20px; }
.login-box input {
  width: 100%; padding: 10px 14px; background: #1a1a1a; border: 1px solid #333;
  color: #fff; border-radius: 6px; font-size: 14px; margin-bottom: 12px; outline: none;
}
.login-box input:focus { border-color: #4a90d9; }
.login-box button {
  width: 100%; padding: 10px; background: #4a90d9; border: none; color: #fff;
  border-radius: 6px; font-size: 14px; cursor: pointer; font-weight: bold;
}
.login-box button:hover { background: #357abd; }
.error-msg { color: #e74c3c; font-size: 12px; margin-top: 8px; display: none; }

.notice-list { display: flex; flex-direction: column; gap: 12px; }
.notice-card {
  background: #141414; border: 1px solid #222; border-radius: 8px; padding: 16px 20px;
  transition: border-color 0.2s;
}
.notice-card:hover { border-color: #333; }
.notice-title { font-size: 15px; color: #7c4dff; font-weight: bold; margin-bottom: 6px; }
.notice-content { font-size: 13px; color: #ccc; line-height: 1.6; white-space: pre-wrap; }
.notice-time { font-size: 11px; color: #555; margin-top: 8px; }
.notice-empty { padding: 48px; text-align: center; color: #555; font-size: 14px; }
.loading { text-align: center; padding: 48px; color: #666; }
.spinner { display: inline-block; width: 24px; height: 24px; border: 2px solid #333; border-top-color: #4a90d9; border-radius: 50%; animation: spin 0.6s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="header">
  <h1>馃摙 閫氱煡鏍?/h1>
  <div class="user-bar" id="userBar" style="display:none">
    <span style="font-size:12px;color:#888">宸茬櫥褰?/span>
    <button class="logout-btn" onclick="logout()">閫€鍑?/button>
  </div>
</div>

<div class="container">
  <div id="loginSection">
    <div class="login-box">
      <h2>馃攼 璇疯緭鍏ュ瘑鐮?/h2>
      <p>閫氱煡鏍忛渶瑕佸瘑鐮佹墠鑳借闂?/p>
      <input type="password" id="passwordInput" placeholder="璇疯緭鍏ュ瘑鐮? onkeydown="if(event.key==='Enter')login()">
      <button onclick="login()">杩涘叆閫氱煡鏍?/button>
      <div class="error-msg" id="loginError">瀵嗙爜閿欒锛岃閲嶈瘯</div>
    </div>
  </div>

  <div id="noticeSection" style="display:none">
    <div class="notice-list" id="noticeList">
      <div class="loading"><div class="spinner"></div></div>
    </div>
  </div>
</div>

<script>
let token = null;

function login() {
  const pwd = document.getElementById('passwordInput').value;
  if (!pwd) return;
  fetch('http://43.226.47.133:3000/login', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ password: pwd })
  })
  .then(r => r.json())
  .then(data => {
    if (data.success) {
      token = data.token;
      document.getElementById('loginSection').style.display = 'none';
      document.getElementById('noticeSection').style.display = 'block';
      document.getElementById('userBar').style.display = 'flex';
      loadNotices();
    } else {
      document.getElementById('loginError').style.display = 'block';
    }
  })
  .catch(() => {
    document.getElementById('loginError').textContent = '鏃犳硶杩炴帴鏈嶅姟鍣?;
    document.getElementById('loginError').style.display = 'block';
  });
}

function logout() {
  token = null;
  document.getElementById('loginSection').style.display = 'block';
  document.getElementById('noticeSection').style.display = 'none';
  document.getElementById('userBar').style.display = 'none';
}

function loadNotices() {
  if (!token) return;
  document.getElementById('noticeList').innerHTML = '<div class="loading"><div class="spinner"></div></div>';

  fetch('http://43.226.47.133:3000/notices', { headers: { 'Authorization': 'Bearer ' + token } })
  .then(r => { if (r.status === 401) { logout(); return; } return r.json(); })
  .then(data => {
    if (!data || !data.notices || data.notices.length === 0) {
      document.getElementById('noticeList').innerHTML = '<div class="notice-empty">馃摥 鏆傛棤閫氱煡</div>';
      return;
    }
    let html = '';
    data.notices.forEach(n => {
      html += `<div class="notice-card">
        <div class="notice-title">${escapeHtml(n.title)}</div>
        <div class="notice-content">${escapeHtml(n.content)}</div>
        <div class="notice-time">${formatDate(n.time)}</div>
      </div>`;
    });
    document.getElementById('noticeList').innerHTML = html;
  })
  .catch(() => {
    document.getElementById('noticeList').innerHTML = '<div class="notice-empty">鈿狅笍 鍔犺浇澶辫触</div>';
  });
}

function escapeHtml(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function formatDate(iso) {
  const d = new Date(iso);
  const pad = n => n.toString().padStart(2, '0');
  return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate())+' '+pad(d.getHours())+':'+pad(d.getMinutes());
}
</script>
</body>
</html>
