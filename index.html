<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>bilibilibaiyun - 个人主页</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex; justify-content: center; align-items: center;
            color: #333;
        }
        .card {
            background: rgba(255,255,255,0.95);
            border-radius: 20px;
            padding: 60px 50px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 480px;
            width: 90%;
        }
        .avatar {
            width: 100px; height: 100px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            margin: 0 auto 20px;
            display: flex; align-items: center; justify-content: center;
            font-size: 42px; color: white;
        }
        h1 { font-size: 28px; margin-bottom: 8px; color: #333; }
        .subtitle { color: #888; font-size: 14px; margin-bottom: 30px; }
        .links { display: flex; flex-direction: column; gap: 12px; }
        .links a {
            display: block; padding: 14px 20px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white; text-decoration: none; border-radius: 12px;
            font-size: 16px; transition: transform 0.2s, box-shadow 0.2s;
        }
        .links a:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(102,126,234,0.4); }
        .footer { margin-top: 30px; color: #aaa; font-size: 12px; }
    </style>
</head>
<body>
    <div class="card">
        <div class="avatar">🌙</div>
        <h1>bilibilibaiyun</h1>
        <p class="subtitle">✨ 欢迎来到我的个人主页</p>
        <div class="links">
            <a href="https://github.com/bilibilibaiyun" target="_blank">🐙 GitHub</a>
            <a href="https://space.bilibili.com/3706992367504041" target="_blank">📺 B站空间</a>
        </div>
        <p class="footer">🚀 托管于 GitHub Pages · 2026</p>
    </div>
</body>
</html>
