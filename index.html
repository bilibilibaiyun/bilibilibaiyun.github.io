<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>鐧戒簯宸ュ叿鐩?/title>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #0f0f1a;
  --surface: #1a1a2e;
  --surface2: #16213e;
  --primary: #6c63ff;
  --primary-glow: rgba(108,99,255,.4);
  --accent: #e94560;
  --text: #eaeaea;
  --text2: #8a8aa0;
  --radius: 16px;
  --radius-sm: 10px;
}
html, body { height: 100%; overflow: hidden; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
  background: var(--bg);
  color: var(--text);
  -webkit-font-smoothing: antialiased;
}

/* === Page System === */
.page { position: fixed; inset: 0; display: none; flex-direction: column; z-index: 1; animation: fadeIn .3s ease; }
.page.active { display: flex; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

/* === Back Button === */
.back-btn {
  position: fixed; top: 20px; left: 20px; z-index: 9999;
  width: 44px; height: 44px; border-radius: 50%;
  background: var(--surface); border: 1px solid rgba(255,255,255,.08);
  color: var(--text); font-size: 20px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  backdrop-filter: blur(12px); transition: all .2s;
}
.back-btn:hover { background: var(--primary); border-color: var(--primary); transform: scale(1.05); }

/* === Home Page === */
#page-home { background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 50%, #0f0f1a 100%); align-items: center; justify-content: center; padding: 40px 20px; }

.avatar-wrap {
  width: 72px; height: 72px; border-radius: 50%;
  border: 3px solid var(--primary);
  overflow: hidden; margin: 0 auto 16px;
  box-shadow: 0 0 30px var(--primary-glow);
}
.avatar-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; }

.hero-title {
  font-size: clamp(32px, 6vw, 56px); font-weight: 800;
  background: linear-gradient(135deg, #6c63ff, #e94560);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  text-align: center; margin-bottom: 8px;
}
.hero-sub { color: var(--text2); font-size: clamp(14px, 2.5vw, 18px); text-align: center; margin-bottom: 50px; }

.categories { display: flex; gap: 24px; flex-wrap: wrap; justify-content: center; max-width: 900px; width: 100%; }
.category-card {
  flex: 1 1 240px; max-width: 280px; min-width: 200px;
  background: var(--surface); border: 1px solid rgba(255,255,255,.06);
  border-radius: var(--radius); padding: 40px 24px 32px; text-align: center;
  cursor: pointer; transition: all .3s ease; position: relative; overflow: hidden;
}
.category-card::before {
  content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
  background: radial-gradient(circle at center, var(--primary-glow), transparent 60%);
  opacity: 0; transition: opacity .4s;
}
.category-card:hover { transform: translateY(-6px); border-color: var(--primary); }
.category-card:hover::before { opacity: 1; }
.cat-icon { font-size: 48px; margin-bottom: 16px; display: block; }
.cat-name { font-size: 20px; font-weight: 700; margin-bottom: 8px; }
.cat-count { color: var(--text2); font-size: 14px; }
.cat-count span { color: var(--primary); font-weight: 700; }

/* === Grid Page === */
#page-grid { background: var(--bg); }
.grid-header { padding: 24px 20px 16px 74px; border-bottom: 1px solid rgba(255,255,255,.06); }
.grid-header h2 { font-size: clamp(20px, 3vw, 28px); font-weight: 700; }
.grid-header p { color: var(--text2); font-size: 14px; margin-top: 4px; }
.grid-content { flex: 1; overflow-y: auto; padding: 24px 20px 100px; scroll-behavior: smooth; }
.grid-content::-webkit-scrollbar { width: 6px; }
.grid-content::-webkit-scrollbar-track { background: transparent; }
.grid-content::-webkit-scrollbar-thumb { background: rgba(255,255,255,.1); border-radius: 3px; }

.grid-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 16px; max-width: 1200px; margin: 0 auto; }

.grid-item {
  aspect-ratio: 1;
  background: var(--surface); border: 1px solid rgba(255,255,255,.06);
  border-radius: var(--radius-sm);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  cursor: pointer; transition: all .25s ease; position: relative; padding: 12px; text-align: center;
  overflow: hidden;
}
.grid-item:hover { border-color: var(--primary); background: var(--surface2); transform: translateY(-2px); }
.grid-number {
  position: absolute; top: 8px; left: 10px;
  font-size: 11px; font-weight: 700; color: var(--primary);
  background: rgba(108,99,255,.15); padding: 2px 7px; border-radius: 6px;
  z-index: 2;
}
.grid-icon { width: 56px; height: 56px; border-radius: 10px; object-fit: cover; margin-bottom: 6px; background: #2a2a40; }
.grid-name { font-size: 12px; line-height: 1.3; color: var(--text); max-width: 100%; word-break: break-all; }

/* === Modal === */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,.7); backdrop-filter: blur(8px);
  z-index: 10000; display: none;
  align-items: center; justify-content: center; padding: 20px;
  animation: fadeIn .2s ease;
}
.modal-overlay.active { display: flex; }
.modal {
  background: var(--surface); border: 1px solid rgba(255,255,255,.08);
  border-radius: var(--radius); max-width: 440px; width: 100%;
  padding: 32px 28px 24px; position: relative;
  animation: modalIn .25s ease;
}
@keyframes modalIn { from { transform: scale(.92) translateY(20px); opacity: 0; } to { transform: scale(1) translateY(0); opacity: 1; } }
.modal-close {
  position: absolute; top: 12px; right: 12px;
  width: 32px; height: 32px; border-radius: 50%;
  border: none; background: rgba(255,255,255,.08); color: var(--text2); font-size: 16px;
  cursor: pointer; transition: all .2s; display: flex; align-items: center; justify-content: center;
}
.modal-close:hover { background: var(--accent); color: #fff; }
.modal-icon-wrap { text-align: center; margin-bottom: 12px; }
.modal-icon-wrap img { width: 72px; height: 72px; border-radius: 12px; object-fit: cover; background: #2a2a40; }
.modal-title { font-size: 20px; font-weight: 700; text-align: center; margin-bottom: 8px; }
.modal-desc { color: var(--text2); font-size: 14px; line-height: 1.6; text-align: center; margin-bottom: 24px; }
.modal-btns { display: flex; gap: 12px; flex-direction: column; }
.modal-btn {
  flex: 1; padding: 14px 20px; border-radius: var(--radius-sm);
  border: none; font-size: 15px; font-weight: 600;
  cursor: pointer; transition: all .2s; text-decoration: none; text-align: center;
}
.btn-download { background: linear-gradient(135deg, var(--primary), #8b7aff); color: #fff; }
.btn-download:hover { box-shadow: 0 4px 20px var(--primary-glow); }
.btn-tutorial { background: var(--surface2); color: var(--text); border: 1px solid rgba(255,255,255,.1); }
.btn-tutorial:hover { background: var(--primary); border-color: var(--primary); }

/* === Footer === */
.footer {
  position: fixed; bottom: 0; left: 0; right: 0;
  text-align: center; padding: 12px 20px;
  font-size: 12px; color: rgba(255,255,255,.25);
  background: linear-gradient(transparent, var(--bg) 40%); z-index: 2; pointer-events: none;
}

/* === Scrollbar === */
*::-webkit-scrollbar { width: 6px; }
*::-webkit-scrollbar-track { background: transparent; }
*::-webkit-scrollbar-thumb { background: rgba(255,255,255,.1); border-radius: 3px; }

@media (max-width: 480px) {
  .categories { gap: 14px; }
  .category-card { flex: 1 1 100%; max-width: 100%; padding: 28px 16px 24px; }
  .grid-container { grid-template-columns: repeat(3, 1fr); gap: 10px; }
  .modal { padding: 24px 20px 20px; }
  .grid-header { padding: 20px 16px 12px 60px; }
  .back-btn { top: 14px; left: 14px; width: 38px; height: 38px; font-size: 16px; }
}
@media (min-width: 768px) { .grid-container { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); } }
@media (min-width: 1200px) { .grid-container { grid-template-columns: repeat(6, 1fr); } }
</style>
</head>
<body>

<!-- ========== HOME PAGE ========== -->

<script>
const TOOLS = [
  { id: 1, cat: "鐢佃剳宸ュ叿", name: "NDM 涓嬭浇鍣?, thumb: "images/ndm.webp", desc: "鏈€寮哄厤璐瑰绾夸笅杞藉伐鍏凤紝鏀寔澶氱嚎绋嬩笅杞姐€佹祻瑙堝櫒鎻掍欢闆嗘垚锛屾浛浠DM鐨勫厤璐归€夋嫨銆?, download: "https://wwasm.lanzouq.com/idGMW3vfq5fg", password: "baiyun", tutorial: "https://www.bilibili.com/video/BV1zoMJ65ExN" },
  { id: 2, cat: "鐢佃剳宸ュ叿", name: "Wallpaper Engine", thumb: "images/wallpaper.webp", desc: "鍔ㄦ€佸绾歌蒋浠舵墦鍖呯増锛屽厤璐圭函鍑€濂界敤锛屾棤闇€浠樿垂鍗冲彲浣撻獙娴烽噺鍔ㄦ€佸绾搞€?, download: "https://bilibilibaiyun.lanzouq.com/iEtlr3wcs9kf", password: "baiyun", tutorial: "https://www.bilibili.com/video/BV11fNX63Evu" },
  { id: 3, cat: "鐢佃剳宸ュ叿", name: "娲涢洩闊充箰", thumb: "images/music.webp", desc: "寮€婧愬厤璐归煶涔愭挱鏀惧櫒锛屾敮鎸佸骞冲彴锛屽彲瀹夎闊虫簮鎻掍欢鐣呭惉鍏ㄧ綉闊充箰锛屾敮鎸佹棤鎹熶笅杞姐€?, download: "https://bilibilibaiyun.lanzouq.com/i6XCT3w76amb", password: "baiyun", tutorial: "https://www.bilibili.com/video/BV1TJN16REmy" },
  { id: 4, cat: "鐢佃剳宸ュ叿", name: "BandiScreen 褰曞睆", thumb: "images/bandicam.webp", desc: "Bandi褰曞睆婊¤鐗堬紝绠€鍗曞ソ鐢ㄧ殑鐢佃剳褰曞睆宸ュ叿锛屾敮鎸侀珮娓呭綍鍒讹紝寤鸿浜烘墜涓€涓€?, download: "https://bilibilibaiyun.lanzouq.com/i77t83w07sja", password: "baiyun", tutorial: "https://www.bilibili.com/video/BV1kMNg6LEFd" },
  { id: 5, cat: "鐢佃剳宸ュ叿", name: "WinRAR", thumb: "images/winrar.webp", desc: "缁忓吀鍘嬬缉瑙ｅ帇宸ュ叿锛屾敮鎸丷AR/ZIP绛夊绉嶆牸寮忥紝绾噣鐗堝厤骞垮憡鍏嶆縺娲汇€?, download: "https://wwasm.lanzouq.com/ix6Qj3va59ji", password: "baiyun", tutorial: "https://www.bilibili.com/video/BV1t3Mj6EEPA" },
  { id: 6, cat: "鍏朵粬宸ュ叿", name: "鏂版満绯荤粺浼樺寲", thumb: "images/optimize.webp", desc: "瓒呰缁嗙殑鏂版満绯荤粺浼樺寲鏀荤暐锛屽惈绯荤粺璁剧疆銆佽蒋浠跺畨瑁呫€佹€ц兘浼樺寲绛夊叏鏂逛綅鎸囧崡銆?, download: null, password: "", tutorial: "https://www.bilibili.com/video/BV1b9Nn6sENh" }
];

const CATEGORIES = ["鐢佃剳宸ュ叿", "鎵嬫満宸ュ叿", "鍏朵粬宸ュ叿"];

function renderCategories() {
  const el = document.getElementById('category-list');
  el.innerHTML = CATEGORIES.map(cat => {
    const count = TOOLS.filter(t => t.cat === cat).length;
    const icons = { "鐢佃剳宸ュ叿": "馃捇", "鎵嬫満宸ュ叿": "馃摫", "鍏朵粬宸ュ叿": "馃搨" };
    return `<div class="category-card" onclick="openGrid('${cat}')">
      <span class="cat-icon">${icons[cat] || '馃搨'}</span>
      <div class="cat-name">${cat}</div>
      <div class="cat-count">鍏?<span>${count}</span> 涓伐鍏?/div>
    </div>`;
  }).join('');
}

function openGrid(cat) {
  document.getElementById('page-home').classList.remove('active');
  const gridPage = document.getElementById('page-grid');
  gridPage.classList.add('active');
  document.getElementById('grid-title').textContent = cat;
  const tools = TOOLS.filter(t => t.cat === cat);
  document.getElementById('grid-sub').textContent = `鍏?${tools.length} 涓伐鍏穈;
  const container = document.getElementById('grid-container');
  container.innerHTML = tools.map((t, i) => {
    const globalNum = TOOLS.indexOf(t) + 1;
    return `<div class="grid-item" onclick="openModal(${globalNum - 1})">
      <span class="grid-number">#${globalNum}</span>
      <img class="grid-icon" src="${t.thumb}" alt="${t.name}" loading="lazy">
      <span class="grid-name">${t.name}</span>
    </div>`;
  }).join('');
  container.scrollTop = 0;
}

function openModal(index) {
  const t = TOOLS[index];
  if (!t) return;
  document.getElementById('modal-icon').src = t.thumb;
  document.getElementById('modal-icon').alt = t.name;
  document.getElementById('modal-title').textContent = t.name;
  document.getElementById('modal-desc').textContent = t.desc;

  const dlBtn = document.getElementById('btn-download');
  const tutBtn = document.getElementById('btn-tutorial');
  tutBtn.href = t.tutorial;

  if (t.download) {
    // Try direct download URL pattern (lanzou supports pwd parameter)
    const sep = t.download.includes('?') ? '&' : '?';
    dlBtn.href = t.download + sep + 'pwd=' + t.password;
    dlBtn.textContent = '猬囷笍 涓嬭浇 路 瀵嗙爜: ' + t.password;
    dlBtn.style.display = '';
    dlBtn.onclick = function(e) {
      navigator.clipboard.writeText(t.password).catch(function(){});
    };
  } else {
    dlBtn.style.display = 'none';
  }
  document.getElementById('modal-overlay').classList.add('active');
}

function closeModal(e) {
  if (e && e.target !== document.getElementById('modal-overlay')) return;
  document.getElementById('modal-overlay').classList.remove('active');
}

function goHome() {
  document.getElementById('page-grid').classList.remove('active');
  document.getElementById('modal-overlay').classList.remove('active');
  document.getElementById('page-home').classList.add('active');
}

document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') {
    if (document.getElementById('modal-overlay').classList.contains('active')) {
      document.getElementById('modal-overlay').classList.remove('active');
    } else if (document.getElementById('page-grid').classList.contains('active')) {
      goHome();
    }
  }
});

window.addEventListener('popstate', function() {
  if (document.getElementById('modal-overlay').classList.contains('active')) {
    document.getElementById('modal-overlay').classList.remove('active');
  } else if (document.getElementById('page-grid').classList.contains('active')) {
    goHome();
  }
});

renderCategories();
</script>
</body>
