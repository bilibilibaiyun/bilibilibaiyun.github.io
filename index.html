<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>白云工具盒 - 精选实用工具与网站</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0d0d1a;
  --sidebar-bg:#111128;
  --surface:#1a1a35;
  --surface2:#1e1e3a;
  --border:rgba(255,255,255,.06);
  --primary:#7c6ff7;
  --primary-glow:rgba(124,111,247,.35);
  --accent:#f04e6e;
  --text:#e8e8f0;
  --text2:#8888a8;
  --text3:#666688;
  --radius:14px;
  --radius-sm:10px;
  --sidebar-w:260px;
}
html,body{height:100%;overflow:hidden}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei","Noto Sans SC",sans-serif;
  background:var(--bg);color:var(--text);
  display:flex;-webkit-font-smoothing:antialiased;
}

/* ===== Sidebar ===== */
.sidebar{
  width:var(--sidebar-w);min-width:var(--sidebar-w);
  height:100vh;background:var(--sidebar-bg);
  border-right:1px solid var(--border);
  display:flex;flex-direction:column;
  overflow-y:auto;overflow-x:hidden;
  z-index:100;transition:transform .3s ease;
}
.sidebar::-webkit-scrollbar{width:4px}
.sidebar::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);border-radius:2px}
.sidebar-logo{
  padding:24px 20px 20px;
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:12px;
}
.sidebar-logo img{width:42px;height:42px;border-radius:50%;border:2px solid var(--primary)}
.sidebar-logo-text h2{font-size:18px;font-weight:700;background:linear-gradient(135deg,#7c6ff7,#f04e6e);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.sidebar-logo-text span{font-size:11px;color:var(--text3);display:block}
.sidebar-nav{padding:12px 0;flex:1}
.nav-section{margin-bottom:4px}
.nav-section-title{
  padding:8px 20px;font-size:11px;font-weight:600;
  color:var(--text3);text-transform:uppercase;
  letter-spacing:1px;cursor:pointer;
  display:flex;align-items:center;gap:6px;
  user-select:none;transition:color .2s;
}
.nav-section-title:hover{color:var(--text2)}
.nav-section-title::after{content:'▾';font-size:10px;margin-left:auto;transition:transform .2s}
.nav-section.collapsed .nav-section-title::after{transform:rotate(-90deg)}
.nav-section.collapsed .nav-items{display:none}
.nav-items{display:flex;flex-direction:column}
.nav-item{
  padding:9px 20px 9px 28px;font-size:13px;color:var(--text2);
  cursor:pointer;transition:all .15s;border-left:2px solid transparent;
  display:flex;align-items:center;gap:8px;text-decoration:none;
}
.nav-item:hover{color:var(--text);background:rgba(124,111,247,.08)}
.nav-item.active{color:var(--primary);background:rgba(124,111,247,.12);border-left-color:var(--primary)}
.nav-item .badge{font-size:10px;background:rgba(124,111,247,.2);color:var(--primary);padding:1px 7px;border-radius:8px;margin-left:auto}
.sidebar-footer{
  padding:16px 20px;border-top:1px solid var(--border);
  font-size:11px;color:var(--text3)
}
.sidebar-footer a{color:var(--primary);text-decoration:none}

/* ===== Main Content ===== */
.main-content{flex:1;display:flex;flex-direction:column;overflow:hidden}
.top-bar{
  padding:16px 28px;display:flex;align-items:center;gap:16px;
  border-bottom:1px solid var(--border);background:rgba(13,13,26,.8);
  backdrop-filter:blur(12px);z-index:50
}
.search-wrap{flex:1;max-width:500px;position:relative}
.search-wrap input{
  width:100%;padding:10px 16px 10px 40px;
  background:var(--surface);border:1px solid var(--border);
  border-radius:20px;color:var(--text);font-size:14px;
  outline:none;transition:all .2s
}
.search-wrap input:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(124,111,247,.1)}
.search-wrap input::placeholder{color:var(--text3)}
.search-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:14px}
.top-bar-actions{display:flex;align-items:center;gap:10px;margin-left:auto}
.top-btn{
  width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  background:var(--surface);border:1px solid var(--border);
  color:var(--text2);font-size:16px;cursor:pointer;
  transition:all .2s;text-decoration:none
}
.top-btn:hover{background:var(--primary);color:#fff;border-color:var(--primary);box-shadow:0 0 16px var(--primary-glow)}
.menu-toggle{display:none}

.content-area{flex:1;overflow-y:auto;padding:24px 28px 40px}
.content-area::-webkit-scrollbar{width:6px}
.content-area::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);border-radius:3px}

/* ===== Category Header ===== */
.cat-header{margin-bottom:24px}
.cat-header h1{font-size:26px;font-weight:700;margin-bottom:6px}
.cat-header p{color:var(--text2);font-size:14px}
.cat-stats{display:flex;gap:16px;margin-top:12px}
.cat-stat{font-size:12px;color:var(--text3)}
.cat-stat b{color:var(--primary)}

/* ===== Cards Grid ===== */
.card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px}
.card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius);padding:20px;cursor:pointer;
  transition:all .25s ease;display:flex;flex-direction:column;
  position:relative;overflow:hidden
}
.card:hover{border-color:var(--primary);transform:translateY(-3px);box-shadow:0 8px 30px rgba(0,0,0,.3)}
.card:hover::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse at 50% 0%,var(--primary-glow),transparent 60%);
  opacity:.6;pointer-events:none
}
.card-icon{
  width:48px;height:48px;border-radius:12px;
  margin-bottom:12px;object-fit:cover;
  background:var(--surface2);display:flex;
  align-items:center;justify-content:center;
  font-size:24px;position:relative;z-index:1
}
.card-icon img{width:100%;height:100%;border-radius:12px;object-fit:cover}
.card-name{font-size:15px;font-weight:600;margin-bottom:6px;position:relative;z-index:1}
.card-desc{font-size:12px;color:var(--text2);line-height:1.5;flex:1;position:relative;z-index:1;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.card-tag{font-size:10px;color:var(--primary);margin-top:10px;position:relative;z-index:1;background:rgba(124,111,247,.1);display:inline-block;padding:2px 8px;border-radius:6px;align-self:flex-start}
.card-link-icon{position:absolute;top:12px;right:14px;color:var(--text3);font-size:14px;opacity:0;transition:opacity .2s;z-index:1}
.card:hover .card-link-icon{opacity:1}

/* ===== Website Card (slightly different) ===== */
.card.website .card-icon{background:rgba(124,111,247,.1)}
.card.website .card-tag{background:rgba(240,78,110,.1);color:var(--accent)}

/* ===== Empty State ===== */
.empty-state{text-align:center;padding:60px 20px;color:var(--text3)}
.empty-state .empty-icon{font-size:56px;margin-bottom:16px}
.empty-state p{font-size:14px}

/* ===== Modal ===== */
.modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.7);
  backdrop-filter:blur(8px);z-index:10000;
  display:none;align-items:center;justify-content:center;padding:20px
}
.modal-overlay.active{display:flex}
.modal{
  background:var(--surface);border:1px solid rgba(255,255,255,.1);
  border-radius:var(--radius);max-width:460px;width:100%;
  padding:32px 28px 24px;position:relative;animation:modalIn .25s ease
}
@keyframes modalIn{from{transform:scale(.92) translateY(20px);opacity:0}to{transform:scale(1) translateY(0);opacity:1}}
.modal-close{
  position:absolute;top:12px;right:12px;
  width:32px;height:32px;border-radius:50%;
  border:none;background:rgba(255,255,255,.08);color:var(--text2);font-size:16px;
  cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center
}
.modal-close:hover{background:var(--accent);color:#fff}
.modal-header{text-align:center;margin-bottom:16px}
.modal-header img,.modal-header .modal-icon-placeholder{width:72px;height:72px;border-radius:16px;margin:0 auto 12px;object-fit:cover;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:36px}
.modal-title{font-size:20px;font-weight:700;margin-bottom:6px}
.modal-desc{color:var(--text2);font-size:14px;line-height:1.7;margin-bottom:24px;text-align:center}
.modal-btns{display:flex;gap:10px;flex-direction:column}
.modal-btn{
  padding:14px 20px;border-radius:var(--radius-sm);border:none;
  font-size:15px;font-weight:600;cursor:pointer;transition:all .2s;
  text-decoration:none;text-align:center;display:block
}
.btn-primary{background:linear-gradient(135deg,var(--primary),#9b8fff);color:#fff}
.btn-primary:hover{box-shadow:0 4px 24px var(--primary-glow)}
.btn-secondary{background:var(--surface2);color:var(--text);border:1px solid rgba(255,255,255,.1)}
.btn-secondary:hover{background:var(--primary);border-color:var(--primary);color:#fff}
.modal-password{text-align:center;color:var(--text3);font-size:12px;margin-top:14px}
.modal-password b{color:var(--primary)}

/* ===== Footer ===== */
.footer{
  text-align:center;padding:12px 20px;font-size:11px;
  color:rgba(255,255,255,.2);border-top:1px solid var(--border);
  background:var(--bg)
}

/* ===== Responsive ===== */
@media(max-width:768px){
  .sidebar{position:fixed;left:0;top:0;transform:translateX(-100%)}
  .sidebar.open{transform:translateX(0)}
  .menu-toggle{display:flex}
  .card-grid{grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px}
  .card{padding:14px}
  .top-bar{padding:12px 16px}
  .content-area{padding:16px}
  .cat-header h1{font-size:20px}
}
@media(max-width:480px){
  .card-grid{grid-template-columns:repeat(2,1fr);gap:8px}
  .card-name{font-size:13px}
  .card-desc{font-size:11px}
}

/* ===== Loading ===== */
.loading-overlay{
  position:fixed;inset:0;z-index:99999;background:var(--bg);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  transition:opacity .5s,visibility .5s
}
.loading-overlay.hidden{opacity:0;visibility:hidden;pointer-events:none}
.loading-spinner{
  width:44px;height:44px;border:3px solid rgba(124,111,247,.2);
  border-top-color:var(--primary);border-radius:50%;animation:spin .7s linear infinite
}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{color:var(--text2);font-size:13px;margin-top:16px}
</style>
</head>

// Build category tree
function getCatTree(){
  const tree = {};
  // Add tool categories
  TOOLS.forEach(t => {
    if(!tree[t.cat]) tree[t.cat] = {type:'tool', items:[], subs:{}};
    tree[t.cat].items.push(t);
  });
  // Add website categories
  WEBSITES.forEach(w => {
    if(!tree[w.cat]) tree[w.cat] = {type:'web', items:[], subs:{}};
    tree[w.cat].items.push(w);
    if(w.sub){
      if(!tree[w.cat].subs[w.sub]) tree[w.cat].subs[w.sub] = [];
      tree[w.cat].subs[w.sub].push(w);
    }
  });
  return tree;
}

let activeCat = null;
let activeSub = null;
let searchQuery = '';

// Init
function init(){
  setTimeout(() => {
    document.getElementById('loading').classList.add('hidden');
  }, 600);
  renderSidebar();
  // Default: show first category
  const cats = Object.keys(getCatTree());
  if(cats.length) selectCategory(cats[0]);
}
function renderSidebar(){
  const tree = getCatTree();
  const nav = document.getElementById('sidebar-nav');
  const icons = {'电脑工具':'💻','手机工具':'📱','其他工具':'📂','实用网站':'🌐'};
  let html = '';
  for(const [cat, data] of Object.entries(tree)){
    const isWeb = data.type === 'web';
    const subKeys = Object.keys(data.subs);
    html += '<div class="nav-section" id="nav-section-'+cat.replace(/\s/g,'')+'">';
    html += '<div class="nav-section-title" onclick="toggleSection(\''+cat.replace(/\s/g,'')+'\')">'+(icons[cat]||'📋')+' '+cat+'</div>';
    html += '<div class="nav-items">';
    html += '<div class="nav-item" data-cat="'+cat+'" onclick="selectCategory(\''+cat+'\')">📋 全部<span class="badge">'+data.items.length+'</span></div>';
    for(const sub of subKeys){
      html += '<div class="nav-item" data-cat="'+cat+'" data-sub="'+sub+'" onclick="selectSubCategory(\''+cat+'\',\''+sub+'\')">'+sub+'<span class="badge">'+data.subs[sub].length+'</span></div>';
    }
    html += '</div></div>';
  }
  nav.innerHTML = html;
}
function toggleSection(catId){
  const sec = document.getElementById('nav-section-'+catId);
  sec.classList.toggle('collapsed');
}
function selectCategory(cat){
  activeCat = cat; activeSub = null;
  updateActiveNav();
  renderContent(cat);
}
function selectSubCategory(cat, sub){
  activeCat = cat; activeSub = sub;
  updateActiveNav();
  renderContent(cat, sub);
}
function updateActiveNav(){
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  const sel = activeSub
    ? document.querySelector('.nav-item[data-cat="'+activeCat+'"][data-sub="'+activeSub+'"]')
    : document.querySelector('.nav-item[data-cat="'+activeCat+'"]:not([data-sub])');
  if(sel) sel.classList.add('active');
}

function getFilteredItems(cat, sub){
  let items;
  if(cat === '实用网站'){
    items = sub ? WEBSITES.filter(w => w.sub === sub) : WEBSITES;
  } else {
    items = sub ? [] : TOOLS.filter(t => t.cat === cat);
  }
  if(searchQuery){
    const q = searchQuery.toLowerCase();
    items = items.filter(i =>
      i.name.toLowerCase().includes(q) ||
      (i.desc && i.desc.toLowerCase().includes(q)) ||
      (i.sub && i.sub.toLowerCase().includes(q))
    );
  }
  return items;
}

function renderContent(cat, sub){
  const items = getFilteredItems(cat, sub);
  document.getElementById('cat-title').textContent = sub || cat;
  const isWeb = cat === '实用网站';
  document.getElementById('cat-desc').textContent = isWeb ? '精选实用网站，按分类整理' : '精选免费工具，带教程和下载';
  document.getElementById('cat-stats').innerHTML = '<span class="cat-stat">共 <b>'+items.length+'</b> 个'+(isWeb?'网站':'工具')+'</span>';

  const grid = document.getElementById('card-grid');
  const empty = document.getElementById('empty-state');
  if(items.length === 0){
    grid.innerHTML = '';
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';

  grid.innerHTML = items.map((item, i) => {
    const isWeb = item.type === 'web';
    const isImgPath = item.icon && (item.icon.startsWith('images/') || item.icon.startsWith('http'));
    const iconHtml = isImgPath
      ? '<img src="'+item.icon+'" alt="'+item.name+'" onerror="this.style.display=none;this.parentElement.textContent=this.alt.charAt(0)||\'📋\'">'
      : (item.icon || '📋');
    return '<div class="card'+(isWeb?' website':'')+'" onclick="openItem(\''+(isWeb?'w':'t')+'_'+item.id+'\')">'+
      '<span class="card-link-icon">'+(isWeb?'🔗':'⬇️')+'</span>'+
      '<div class="card-icon">'+iconHtml+'</div>'+
      '<div class="card-name">'+item.name+'</div>'+
      '<div class="card-desc">'+item.desc+'</div>'+
      '<span class="card-tag">'+(isWeb?(item.sub||'网站'):'工具')+'</span>'+
    '</div>';
  }).join('');
}

function openItem(key){
  const [type, id] = key.split('_');
  let item;
  if(type === 't'){
    item = TOOLS.find(t => t.id === parseInt(id));
  } else {
    item = WEBSITES.find(w => w.id === id);
  }
  if(!item) return;
  const modal = document.getElementById('modal');
  const isWeb = item.type === 'web';

  const isImgPath = item.icon && (item.icon.startsWith('images/') || item.icon.startsWith('http'));
  document.getElementById('modal-icon-wrap').innerHTML = isImgPath
    ? '<img src="'+item.icon+'" alt="'+item.name+'" onerror="this.style.display=none;this.parentElement.innerHTML=\'<div class=modal-icon-placeholder>📋</div>\'">'
    : '<div class="modal-icon-placeholder">'+(item.icon||'📋')+'</div>';
  document.getElementById('modal-title').textContent = item.name;
  document.getElementById('modal-desc').textContent = item.desc;

  const btns = document.getElementById('modal-btns');
  const pwd = document.getElementById('modal-pwd-hint');

  if(isWeb){
    btns.innerHTML = '<a class="modal-btn btn-primary" href="'+item.url+'" target="_blank" rel="noopener">🔗 打开网站</a>';
    pwd.innerHTML = '';
  } else {
    let btnHtml = '';
    if(item.url){
      const sep = item.url.includes('?')?'&':'?';
      btnHtml += '<a class="modal-btn btn-primary" href="'+item.url+sep+'pwd='+item.pwd+'" target="_blank" rel="noopener" onclick="navigator.clipboard.writeText(\''+item.pwd+'\').catch(()=>{})">⬇️ 下载 · 密码: '+item.pwd+'</a>';
    }
    if(item.tutorial){
      btnHtml += '<a class="modal-btn btn-secondary" href="'+item.tutorial+'" target="_blank" rel="noopener">📺 观看教程</a>';
    }
    btns.innerHTML = btnHtml;
    pwd.innerHTML = item.pwd ? '💡 提取码：<b>'+item.pwd+'</b>（点击下载自动复制）' : '';
  }

  modal.classList.add('active');
}

function closeModal(e){
  if(e && e.target !== document.getElementById('modal')) return;
  document.getElementById('modal').classList.remove('active');
}

function doSearch(){
  searchQuery = document.getElementById('search-input').value.trim();
  if(activeCat) renderContent(activeCat, activeSub);
}

function toggleSidebar(){
  document.getElementById('sidebar').classList.toggle('open');
}

// Keyboard shortcuts
document.addEventListener('keydown', function(e){
  if(e.key === 'Escape'){
    const modal = document.getElementById('modal');
    if(modal.classList.contains('active')){ modal.classList.remove('active'); return; }
    document.getElementById('search-input').value = '';
    searchQuery = '';
    if(activeCat) renderContent(activeCat, activeSub);
  }
  if(e.ctrlKey && e.key === 'k'){
    e.preventDefault();
    document.getElementById('search-input').focus();
  }
});

// Close sidebar on content click (mobile)
document.querySelector('.main-content').addEventListener('click', function(){
  document.getElementById('sidebar').classList.remove('open');
});

init();
</script>
