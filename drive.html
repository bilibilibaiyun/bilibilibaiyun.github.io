<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>鐧戒簯鐩?- 鐧戒簯宸ュ叿鐩?/title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Microsoft YaHei',sans-serif;background:#0a0a0a;color:#e0e0e0;min-height:100vh}
.header{background:#111;padding:16px 24px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #222}
.header h1{font-size:20px;color:#fff}
.header-sub{font-size:12px;color:#666}
.user-bar{display:flex;align-items:center;gap:12px}
.logout-btn{background:0;border:1px solid #444;color:#888;padding:4px 12px;border-radius:4px;cursor:pointer;font-size:12px}
.logout-btn:hover{border-color:#e74c3c;color:#e74c3c}
.container{max-width:900px;margin:0 auto;padding:24px}
.login-box{max-width:360px;margin:80px auto;background:#141414;border:1px solid #222;border-radius:8px;padding:32px;text-align:center}
.login-box h2{margin-bottom:8px;font-size:22px}
.login-box p{color:#666;font-size:13px;margin-bottom:20px}
.login-box input{width:100%;padding:10px 14px;background:#1a1a1a;border:1px solid #333;color:#fff;border-radius:6px;font-size:14px;margin-bottom:12px;outline:0}
.login-box input:focus{border-color:#4a90d9}
.login-box button{width:100%;padding:10px;background:#4a90d9;border:0;color:#fff;border-radius:6px;font-size:14px;cursor:pointer;font-weight:700}
.login-box button:hover{background:#357abd}
.error-msg{color:#e74c3c;font-size:12px;margin-top:8px;display:none}
.path-bar{display:flex;align-items:center;gap:8px;margin-bottom:12px;font-size:13px;color:#888}
.path-bar span{cursor:pointer}
.path-bar span:hover{color:#4a90d9}
.path-bar .sep{color:#444}
.toolbar{display:flex;align-items:center;gap:12px;margin-bottom:20px;flex-wrap:wrap}
.upload-btn{padding:8px 18px;background:#2ecc71;border:0;color:#fff;border-radius:6px;cursor:pointer;font-size:13px;font-weight:700}
.upload-btn:hover{background:#27ae60}
.folder-btn{padding:8px 18px;background:#7c4dff;border:0;color:#fff;border-radius:6px;cursor:pointer;font-size:13px;font-weight:700}
.folder-btn:hover{background:#651fff}
.refresh-btn{padding:8px 18px;background:#333;border:0;color:#ccc;border-radius:6px;cursor:pointer;font-size:13px}
.refresh-btn:hover{background:#444}
.quota{margin-left:auto;color:#666;font-size:12px}
.file-list{background:#141414;border:1px solid #222;border-radius:8px;overflow:hidden}
.file-list .empty{padding:48px;text-align:center;color:#555;font-size:14px}
.file-item{display:flex;align-items:center;padding:12px 16px;border-bottom:1px solid #1a1a1a;cursor:pointer;transition:background .15s}
.file-item:hover{background:#1a1a1a}
.file-item:last-child{border-bottom:0}
.file-icon{font-size:24px;margin-right:12px;width:32px;text-align:center;flex-shrink:0}
.file-info{flex:1;min-width:0}
.file-name{font-size:14px;color:#e0e0e0;word-break:break-all}
.file-name.is-folder{color:#7c4dff;font-weight:700}
.file-meta{font-size:11px;color:#666;margin-top:2px}
.file-actions{display:flex;gap:8px;flex-shrink:0}
.file-actions button{padding:4px 10px;border:0;border-radius:4px;cursor:pointer;font-size:11px;color:#fff}
.dl-btn{background:#4a90d9}
.dl-btn:hover{background:#357abd}
.del-btn{background:#c0392b}
.del-btn:hover{background:#a93226}
.modal-overlay{display:none;position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,.6);align-items:center;justify-content:center}
.modal-overlay.show{display:flex}
.upload-modal{background:#1a1a1a;border:1px solid #333;border-radius:12px;padding:28px;width:480px;max-width:90vw;max-height:80vh;overflow-y:auto}
.upload-modal h3{margin-bottom:16px;color:#fff;font-size:16px}
.upload-modal-close{float:right;background:0;border:0;color:#666;font-size:20px;cursor:pointer}
.upload-modal-close:hover{color:#e74c3c}
.drop-zone{border:2px dashed #444;border-radius:10px;padding:48px 24px;text-align:center;transition:.2s;margin-bottom:16px;cursor:pointer}
.drop-zone.dragover{border-color:#2ecc71;background:rgba(46,204,113,.08)}
.drop-zone-icon{font-size:40px;margin-bottom:8px}
.drop-zone p{color:#888;font-size:13px}
.drop-zone p b{color:#2ecc71}
.drop-zone-btns{display:flex;gap:12px;justify-content:center;margin-top:12px;flex-wrap:wrap}
.drop-zone-btns button{padding:8px 16px;border:0;border-radius:6px;cursor:pointer;font-size:12px}
.btn-select-file{background:#4a90d9;color:#fff}
.btn-select-folder{background:#7c4dff;color:#fff}
.upload-queue{margin-top:16px}
.queue-item{display:flex;align-items:center;justify-content:space-between;padding:8px 10px;background:#141414;border-radius:6px;margin-bottom:6px;font-size:12px}
.queue-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-right:8px}
.queue-size{color:#666;white-space:nowrap;margin-right:8px}
.queue-status{white-space:nowrap}
.queue-status.done{color:#2ecc71}
.queue-status.error{color:#e74c3c}
.queue-status.waiting{color:#888}
.queue-status.uploading{color:#4a90d9}
.start-upload-btn{width:100%;padding:10px;background:#2ecc71;border:0;color:#fff;border-radius:6px;cursor:pointer;font-size:14px;font-weight:700;margin-top:8px}
.start-upload-btn:hover{background:#27ae60}
.start-upload-btn:disabled{background:#333;color:#666;cursor:not-allowed}
.progress-bar{width:100%;height:4px;background:#222;border-radius:2px;margin:8px 0;display:none}
.progress-bar .fill{height:100%;background:#2ecc71;border-radius:2px;transition:width .3s}
.toast{position:fixed;top:20px;right:20px;background:#2ecc71;color:#fff;padding:10px 20px;border-radius:6px;font-size:13px;z-index:99999;opacity:0;transition:.3s;pointer-events:none}
.toast.show{opacity:1}
.toast.error{background:#e74c3c}
.loading{text-align:center;padding:48px;color:#666}
.spinner{display:inline-block;width:24px;height:24px;border:2px solid #333;border-top-color:#4a90d9;border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.new-folder-input{display:flex;gap:8px;margin-bottom:12px;align-items:center}
.new-folder-input input{flex:1;padding:8px 12px;background:#1a1a1a;border:1px solid #333;color:#fff;border-radius:6px;font-size:13px;outline:0}
.new-folder-input input:focus{border-color:#7c4dff}
.new-folder-input button{padding:8px 14px;background:#7c4dff;border:0;color:#fff;border-radius:6px;cursor:pointer;font-size:12px}
.new-folder-input button:hover{background:#651fff}
.new-folder-input button.cancel{background:#444}
.new-folder-input button.cancel:hover{background:#555}
@media(max-width:600px){.container{padding:12px}.file-actions{flex-direction:column;gap:4px}.upload-modal{padding:20px}}
</style>
</head>
<body>
<div class="header"><h1>鈽侊笍 鐧戒簯鐩?<span class="header-sub">路 鐧戒簯宸ュ叿鐩?/span></h1><div class="user-bar" id="userBar" style="display:none"><span style="font-size:12px;color:#888">宸茬櫥褰?/span><button class="logout-btn" onclick="logout()">閫€鍑?/button></div></div>
<div class="container">
<div id="loginSection"><div class="login-box"><h2>馃攼 璇疯緭鍏ュ瘑鐮?/h2><p>鐧戒簯鐩橀渶瑕佸瘑鐮佹墠鑳借闂?/p><input type="password" id="pw" placeholder="璇疯緭鍏ュ瘑鐮? onkeydown="if(event.key==='Enter')login()"><button onclick="login()">杩涘叆鐧戒簯鐩?/button><div class="error-msg" id="loginErr">瀵嗙爜閿欒锛岃閲嶈瘯</div></div></div>
<div id="driveSection" style="display:none">
<div class="path-bar" id="pathBar"></div>
<div class="new-folder-input" id="newFolderDiv" style="display:none"><input type="text" id="folderName" placeholder="鏂囦欢澶瑰悕绉? onkeydown="if(event.key==='Enter')createFolder()"><button onclick="createFolder()">纭畾</button><button class="cancel" onclick="document.getElementById('newFolderDiv').style.display='none'">鍙栨秷</button></div>
<div class="toolbar"><button class="upload-btn" onclick="showUploadModal()">馃摛 涓婁紶</button><button class="folder-btn" onclick="showNewFolder()">馃搧 鏂板缓鏂囦欢澶?/button><button class="refresh-btn" onclick="loadFiles()">馃攧 鍒锋柊</button><span class="quota" id="quotaInfo"></span></div>
<div class="file-list" id="fileList"><div class="loading"><div class="spinner"></div></div></div>
</div>
</div>
<div class="modal-overlay" id="uploadModal"><div class="upload-modal"><button class="upload-modal-close" onclick="closeUploadModal()">鉁?/button><h3>馃摛 涓婁紶鍒扮櫧浜戠洏</h3><p style="color:#888;font-size:12px;margin-bottom:12px">馃搧 褰撳墠鐩綍锛?b style="color:#7c4dff" id="uploadPathLabel">/</b></p><div class="drop-zone" id="dropZone" ondragover="event.preventDefault();this.classList.add('dragover')" ondragleave="this.classList.remove('dragover')" ondrop="handleDrop(event)"><div class="drop-zone-icon">馃搨</div><p>鎷栨嫿鏂囦欢/鏂囦欢澶瑰埌<b>姝ゅ</b></p><div class="drop-zone-btns"><button class="btn-select-file" onclick="document.getElementById('fileInp').click()">馃搫 閫夋嫨鏂囦欢</button><button class="btn-select-folder" onclick="document.getElementById('folderInp').click()">馃搧 閫夋嫨鏂囦欢澶?/button></div><input type="file" id="fileInp" multiple style="display:none" onchange="addToQueue(this.files)"><input type="file" id="folderInp" multiple webkitdirectory style="display:none" onchange="addToQueue(this.files)"></div><div class="progress-bar" id="modalBar"><div class="fill" id="modalFill"></div></div><div class="upload-queue" id="uploadQueue"><div style="text-align:center;color:#555;padding:12px;font-size:13px">杩樻病娣诲姞鏂囦欢</div></div><button class="start-upload-btn" id="startUploadBtn" onclick="startUpload()" disabled>寮€濮嬩笂浼?/button></div></div>
<div class="toast" id="toast"></div>
<script>
var token=null,currentPath='',uploadQueue=[];
function showToast(m,e){var t=document.getElementById('toast');t.textContent=m;t.className='toast show'+(e?' error':'');setTimeout(function(){t.className='toast'},2000)}
function login(){var p=document.getElementById('pw').value;if(!p)return;fetch('http://43.226.47.133:3000/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({password:p})}).then(function(r){return r.json()}).then(function(d){if(d.success){token=d.token;document.getElementById('loginSection').style.display='none';document.getElementById('driveSection').style.display='block';document.getElementById('userBar').style.display='flex';loadFiles()}else{document.getElementById('loginErr').style.display='block'}}).catch(function(){document.getElementById('loginErr').textContent='鏃犳硶杩炴帴鏈嶅姟鍣?;document.getElementById('loginErr').style.display='block'})}
function logout(){token=null;currentPath='';document.getElementById('loginSection').style.display='block';document.getElementById('driveSection').style.display='none';document.getElementById('userBar').style.display='none'}
function nav(p){currentPath=p;loadFiles();updatePath()}
function updatePath(){var b=document.getElementById('pathBar');if(!currentPath){b.innerHTML='<span onclick="nav(\'\')">馃搧 鐧戒簯鐩?/span>';return}var ps=currentPath.split('/').filter(Boolean),h='<span onclick="nav(\'\')">馃搧 鐧戒簯鐩?/span>',a='';ps.forEach(function(p,i){a+=p+'/';h+='<span class="sep">鈥?/span><span onclick="nav(\''+a.slice(0,-1)+'\')">'+e(p)+'</span>'});b.innerHTML=h}
function loadFiles(){if(!token)return;document.getElementById('fileList').innerHTML='<div class="loading"><div class="spinner"></div></div>';fetch('http://43.226.47.133:3000/files?path='+encodeURIComponent(currentPath),{headers:{'Authorization':'Bearer '+token}}).then(function(r){if(r.status===401){logout();return}return r.json()}).then(function(d){if(!d||!d.items)return;var l=document.getElementById('fileList');if(d.items.length===0){l.innerHTML='<div class="empty">馃搧 姝ゆ枃浠跺す涓虹┖</div>';updateQuota(0);return}var ts=0,h='';d.items.forEach(function(i){ts+=i.size||0;if(i.isFolder){h+='<div class="file-item" onclick="nav(\''+ep(currentPath?currentPath+'/'+i.name:i.name)+'\')"><div class="file-icon">馃搧</div><div class="file-info"><div class="file-name is-folder">'+e(i.name)+'</div><div class="file-meta">鏂囦欢澶?/div></div><div class="file-actions"><button class="del-btn" onclick="event.stopPropagation();del(\''+ep(i.path)+'\')">鍒犻櫎</button></div></div>'}else{h+='<div class="file-item"><div class="file-icon">'+icon(i.type)+'</div><div class="file-info"><div class="file-name">'+e(i.name)+'</div><div class="file-meta">'+i.sizeFormatted+' 路 '+fd(i.modified)+'</div></div><div class="file-actions"><button class="dl-btn" onclick="event.stopPropagation();dl(\''+ep(i.path)+'\')">涓嬭浇</button><button class="del-btn" onclick="event.stopPropagation();del(\''+ep(i.path)+'\')">鍒犻櫎</button></div></div>'}});l.innerHTML=h;updateQuota(ts)}).catch(function(){document.getElementById('fileList').innerHTML='<div class="empty">鈿狅笍 鍔犺浇澶辫触</div>'})}
function showNewFolder(){document.getElementById('newFolderDiv').style.display='flex';document.getElementById('folderName').value='';document.getElementById('folderName').focus()}
function createFolder(){var n=document.getElementById('folderName').value.trim();if(!n){showToast('璇疯緭鍏ユ枃浠跺す鍚嶇О',1);return}fetch('http://43.226.47.133:3000/folder',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},body:JSON.stringify({name:n,path:currentPath})}).then(function(r){return r.json()}).then(function(d){if(d.success){showToast('鉁?鏂囦欢澶瑰凡鍒涘缓');document.getElementById('newFolderDiv').style.display='none';loadFiles()}else{showToast(d.error||'鍒涘缓澶辫触',1)}}).catch(function(){showToast('鍒涘缓澶辫触',1)})}
function showUploadModal(){uploadQueue=[];document.getElementById('uploadQueue').innerHTML='<div style="text-align:center;color:#555;padding:12px;font-size:13px">杩樻病娣诲姞鏂囦欢</div>';document.getElementById('startUploadBtn').disabled=true;document.getElementById('modalBar').style.display='none';document.getElementById('uploadPathLabel').textContent=currentPath?'馃搧 '+currentPath:'馃搧 鏍圭洰褰?;document.getElementById('uploadModal').classList.add('show')}
function closeUploadModal(){document.getElementById('uploadModal').classList.remove('show');uploadQueue=[]}
function addToQueue(files){if(!files||files.length===0)return;for(var i=0;i<files.length;i++){var f=files[i];uploadQueue.push({file:f,rel:f.webkitRelativePath||f.name,status:'waiting'})}renderQ()}
function handleDrop(e){e.preventDefault();document.getElementById('dropZone').classList.remove('dragover');var items=e.dataTransfer.items;if(!items||items.length===0){if(e.dataTransfer.files.length>0)addToQueue(e.dataTransfer.files);return}var prs=[];for(var i=0;i<items.length;i++){var entry=items[i].webkitGetAsEntry?items[i].webkitGetAsEntry():null;if(entry)prs.push(trav(entry,''))}Promise.all(prs).then(function(arrs){var all=arrs.flat();if(all.length>0){var fs=[];all.forEach(function(x){Object.defineProperty(x.file,'webkitRelativePath',{value:x.rel,writable:false});fs.push(x.file)});addToQueue(fs)}})}
function trav(entry,path){return new Promise(function(resolve){if(entry.isFile){entry.file(function(file){resolve([{file:file,rel:path?path+'/'+entry.name:entry.name}])})}else if(entry.isDirectory){var dr=entry.createReader(),results=[];function read(){dr.readEntries(function(entries){if(entries.length===0){resolve(results)}else{var prs=[];for(var i=0;i<entries.length;i++)prs.push(trav(entries[i],path?path+'/'+entry.name:entry.name));Promise.all(prs).then(function(arrs){results.push.apply(results,arrs.flat());read()})}})}read()}else{resolve([])}})}
function renderQ(){var q=document.getElementById('uploadQueue');if(uploadQueue.length===0){q.innerHTML='<div style="text-align:center;color:#555;padding:12px;font-size:13px">杩樻病娣诲姞鏂囦欢</div>';document.getElementById('startUploadBtn').disabled=true;return}var h='';uploadQueue.forEach(function(item,idx){var n=item.rel||item.file.name,s=fsize(item.file.size),t={waiting:'绛夊緟涓婁紶',uploading:'涓婁紶涓?..',done:'鉁?瀹屾垚',error:'鉂?澶辫触'}[item.status]||'';h+='<div class="queue-item"><span class="queue-name">'+e(n)+'</span><span class="queue-size">'+s+'</span><span class="queue-status '+item.status+'">'+t+'</span></div>'});q.innerHTML=h;document.getElementById('startUploadBtn').disabled=false}
function startUpload(){var btn=document.getElementById('startUploadBtn');btn.disabled=true;btn.textContent='涓婁紶涓?..';var tot=uploadQueue.filter(function(f){return f.status==='waiting'}).length;if(tot===0){showToast('娌℃湁寰呬笂浼犵殑鏂囦欢',1);btn.disabled=false;btn.textContent='寮€濮嬩笂浼?;return}var bar=document.getElementById('modalBar'),fill=document.getElementById('modalFill');bar.style.display='block';var comp=0;function next(idx){if(idx>=uploadQueue.length){bar.style.display='none';btn.textContent='寮€濮嬩笂浼?;btn.disabled=false;showToast('鉁?涓婁紶瀹屾垚');closeUploadModal();loadFiles();return}var item=uploadQueue[idx];if(item.status!=='waiting'){next(idx+1);return}item.status='uploading';renderQ();var fd=new FormData;fd.append('file',item.file);var rp=item.rel||item.file.name,nr=rp.replace(/\\\\/g,"/"),ls=nr.lastIndexOf("/"),targetDir=currentPath;if(ls>0){var sub=nr.substring(0,ls);targetDir=currentPath?currentPath+"/"+sub:sub}fd.append("filename",nr.substring(ls>0?ls+1:0));fd.append("path",targetDir);var/')>0||rp.indexOf('\\')>0){var nr=rp.replace(/\\/g,'/'),ls=nr.lastIndexOf('/');if(ls>0)td=currentPath?currentPath+'/'+nr.substring(0,ls):nr.substring(0,ls)}fd.append('filename',rp.replace(/^.*[/\\]/,''));fd.append('path',td);var xhr=new XMLHttpRequest;xhr.open('POST','http://43.226.47.133:3000/upload');xhr.setRequestHeader('Authorization','Bearer '+token);xhr.upload.onprogress=function(e){if(e.lengthComputable&&tot>0)fill.style.width=(comp+e.loaded/e.total)/tot*100+'%'};xhr.onload=function(){comp++;if(xhr.status===200){item.status='done'}else{item.status='error';if(xhr.status===401)logout()}fill.style.width=comp/tot*100+'%';renderQ();next(idx+1)};xhr.onerror=function(){comp++;item.status='error';renderQ();next(idx+1)};xhr.send(fd)}next(0)}
function dl(p){window.open('http://43.226.47.133:3000/download/'+encodeURIComponent(p)+'?token='+token,'_blank')}
function del(p){if(!confirm('纭畾鍒犻櫎銆?+p+'銆嶅悧锛?))return;fetch('http://43.226.47.133:3000/files/'+encodeURIComponent(p),{method:'DELETE',headers:{'Authorization':'Bearer '+token}}).then(function(r){if(r.status===401){logout();return}return r.json()}).then(function(d){if(d&&d.success){showToast('宸插垹闄?);loadFiles()}else{showToast(d&&d.error||'鍒犻櫎澶辫触',1)}}).catch(function(){showToast('鍒犻櫎澶辫触',1)})}
function icon(ext){var icons={'.jpg':'馃柤锔?,'.jpeg':'馃柤锔?,'.png':'馃柤锔?,'.gif':'馃柤锔?,'.webp':'馃柤锔?,'.mp4':'馃幀','.avi':'馃幀','.mov':'馃幀','.mkv':'馃幀','.mp3':'馃幍','.wav':'馃幍','.ogg':'馃幍','.pdf':'馃搫','.doc':'馃摑','.docx':'馃摑','.zip':'馃摝','.rar':'馃摝','.7z':'馃摝','.txt':'馃搩','.md':'馃搩','.json':'馃搩','.exe':'鈿欙笍','.apk':'馃摫','.py':'馃捇','.js':'馃捇','.html':'馃捇'};return icons[ext.toLowerCase()]||'馃搫'}
function e(s){var d=document.createElement('div');d.textContent=s;return d.innerHTML}
function ep(s){return(s||'').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/'/g,'\\\'')}
function fd(iso){var d=new Date(iso),pad=function(n){return n.toString().padStart(2,'0')};return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate())+' '+pad(d.getHours())+':'+pad(d.getMinutes())}
function fsize(b){if(!b)return'0 B';var k=1024,s=['B','KB','MB','GB'],i=Math.floor(Math.log(b)/Math.log(k));return parseFloat((b/Math.pow(k,i)).toFixed(2))+' '+s[i]}
function updateQuota(b){var gb=(b/(1024*1024*1024)).toFixed(2);document.getElementById('quotaInfo').textContent='宸茬敤 '+gb+' GB / 鍏?20 GB'}
</script>
</body>
</html>
